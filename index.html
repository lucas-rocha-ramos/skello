<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skello - Workspace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Tela de Login / Cadastro (MANTIDO) -->
    <div id="auth-screen" class="auth-overlay">
        <div class="auth-box">
            <div class="logo-large">Skello</div>
            <div class="auth-tabs">
                <label><input type="radio" name="authType" value="empresa" checked onchange="toggleAuthFields()"> Empresa</label>
                <label><input type="radio" name="authType" value="user" onchange="toggleAuthFields()"> Usuário</label>
            </div>
            <input type="text" id="username" placeholder="Nome">
            <div id="fields-empresa">
                <input type="email" id="email" placeholder="E-mail">
                <input type="text" id="zap" placeholder="WhatsApp">
            </div>
            <div id="fields-user" style="display: none;">
                <input type="text" id="companyCode" placeholder="Código da Empresa">
            </div>
            <input type="password" id="password" placeholder="Senha">
            <div class="auth-actions">
                <button class="primary-btn" onclick="login()">Entrar</button>
                <button class="secondary-btn" onclick="register()">Criar Conta</button>
            </div>
            <p id="auth-msg" class="msg"></p>
        </div>
    </div>

    <!-- Interface do Kanban -->
    <div id="app-screen" style="display: none; height: 100%; flex-direction: column;">
        <header class="glass-header">
            <div class="logo">Skello</div>
            <div class="user-info">
                <span id="user-display"></span>
                <button class="secondary-btn admin-only" onclick="showConfig()">Configurações</button>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>
        </header>

        <main class="board-container" id="board" ondrop="dropList(event)" ondragover="allowDropList(event)"></main>

        <button class="add-list-btn admin-only" onclick="openNewListModal()">+ Adicionar Lista</button>
    </div>

    <!-- MODAIS DO SISTEMA -->
    <div id="config-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <h3>Perfil da Empresa</h3>
            <div class="code-display" id="display-company-code"></div>
            <button class="primary-btn" onclick="closeModal('config-modal')">Fechar</button>
        </div>
    </div>

    <div id="modal-new-list" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <h3>Nova Lista</h3>
            <input type="text" id="input-new-list-title" placeholder="Nome da lista...">
            <div class="modal-actions-row">
                <button class="secondary-btn" onclick="closeModal('modal-new-list')">Cancelar</button>
                <button class="primary-btn" onclick="confirmAddList()">Criar</button>
            </div>
        </div>
    </div>

    <div id="modal-new-card" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <h3>Nova Demanda</h3>
            <input type="text" id="input-new-card-title" placeholder="Título da demanda">
            <select id="select-new-card-assignee" class="apple-select"></select>
            <div class="modal-actions-row">
                <button class="secondary-btn" onclick="closeModal('modal-new-card')">Cancelar</button>
                <button class="primary-btn" onclick="confirmAddCard()">Adicionar</button>
            </div>
        </div>
    </div>

    <!-- Menu Rápido (Quick Actions Trello) -->
    <div id="quick-actions-menu" class="context-menu" style="display:none;">
        <button onclick="cardAction('abrir')">􀏜 Abrir cartão</button>
        <button onclick="cardAction('etiquetas')">􀏧 Editar Etiquetas</button>
        <button onclick="cardAction('membros')">􀉮 Alterar Membros</button>
        <button onclick="cardAction('capa')">􀏚 Alterar capa</button>
        <button onclick="cardAction('datas')">􀐫 Editar datas</button>
        <button onclick="cardAction('mover')">􀍢 Mover</button>
        <button onclick="cardAction('jira')">􀆄 Criar ticket do Jira</button>
        <button onclick="cardAction('copiar_cartao')">􀉁 Copiar cartão</button>
        <button onclick="cardAction('copiar_link')">􀉂 Copiar link</button>
        <button onclick="cardAction('espelho')">􀏜 Espelho</button>
        <button class="danger-text" onclick="cardAction('arquivar')">􀈑 Arquivar</button>
    </div>

    <!-- Modal: Detalhes do Cartão (Trello View) -->
    <div id="modal-card-details" class="modal-overlay" style="display:none;">
        <div class="modal-box modal-large">
            <div class="card-detail-header">
                <div class="card-detail-title-area">
                    <div class="check-circle large" onclick="toggleDetailCheck(this)"></div>
                    <h2 id="detail-card-title">Título</h2>
                </div>
                <div class="card-detail-badges">
                    <button class="badge-btn">􀅼 Adicionar</button>
                    <button class="badge-btn" onclick="cardAction('etiquetas')">􀏧 Etiquetas</button>
                    <button class="badge-btn" onclick="cardAction('datas')">􀐫 Datas</button>
                    <button class="badge-btn" onclick="toggleDetailCheck(this)">􀆄 Checklist</button>
                    <button class="badge-btn" onclick="cardAction('membros')">􀉮 Membros</button>
                </div>
            </div>
            <div class="card-detail-body">
                <h3 class="section-title">􀌗 Descrição</h3>
                <textarea class="apple-textarea" id="detail-description" onblur="saveDescription(this.value)" placeholder="Adicione uma descrição mais detalhada..."></textarea>
            </div>
            <div class="modal-actions-row right-align">
                <button class="primary-btn" onclick="closeModal('modal-card-details')">Fechar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skello - Workspace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Tela de Login / Cadastro -->
    <div id="auth-screen" class="auth-overlay">
        <div class="auth-box">
            <div class="logo-large">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <rect x="3" y="3" width="18" height="18" rx="6" fill="#0071e3" stroke="none"/>
                    <rect x="7" y="7" width="4" height="10" rx="2" fill="#fff" stroke="none"/>
                    <rect x="13" y="7" width="4" height="6" rx="2" fill="#fff" stroke="none"/>
                </svg>
                Skello
            </div>
            
            <div class="auth-tabs">
                <label><input type="radio" name="authType" value="empresa" checked onchange="toggleAuthFields()"> Empresa</label>
                <label><input type="radio" name="authType" value="user" onchange="toggleAuthFields()"> Usuário</label>
            </div>

            <input type="text" id="username" placeholder="Nome (Empresa ou Usuário)">
            
            <div id="fields-empresa">
                <input type="email" id="email" placeholder="E-mail Administrativo">
                <input type="text" id="zap" placeholder="WhatsApp Contato">
            </div>
            
            <div id="fields-user" style="display: none;">
                <input type="text" id="companyCode" placeholder="Código Único da Empresa">
            </div>

            <input type="password" id="password" placeholder="Senha">
            
            <div class="auth-actions">
                <button class="primary-btn" onclick="login()">Entrar</button>
                <button class="secondary-btn" onclick="register()">Criar Conta</button>
            </div>
            <p id="auth-msg" class="msg"></p>
        </div>
    </div>

    <!-- Interface do Kanban -->
    <div id="app-screen" style="display: none; height: 100%; flex-direction: column;">
        <header class="glass-header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <rect x="3" y="3" width="18" height="18" rx="4" fill="#0071e3" stroke="none"/>
                    <rect x="7" y="7" width="3" height="10" rx="1.5" fill="#fff" stroke="none"/>
                    <rect x="14" y="7" width="3" height="6" rx="1.5" fill="#fff" stroke="none"/>
                </svg>
                Skello
            </div>
            <div class="user-info">
                <span id="user-display"></span>
                <button class="secondary-btn admin-only" onclick="showConfig()">Configurações</button>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>
        </header>

        <main class="board-container" id="board" ondrop="dropList(event)" ondragover="allowDropList(event)">
            <div class="loader">Carregando dados do servidor...</div>
        </main>

        <button class="add-list-btn admin-only" onclick="addList()">+ Adicionar Lista</button>
    </div>

    <!-- Modal de Configurações da Empresa -->
    <div id="config-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <h3>Perfil da Empresa</h3>
            <p>Compartilhe o código abaixo com seus funcionários para que eles se cadastrem na sua área de trabalho:</p>
            <div class="code-display" id="display-company-code"></div>
            <button class="primary-btn" onclick="closeConfig()">Fechar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
